{% extends 'general/layout.html' %}
{% load i18n %}

{% block head_title %}{% trans "Pagina de libros" %}{% endblock %}
{% block page_title %}{% trans "Libros" %}{% endblock %}
{% block page_content %}
    <h2> {% trans "Nuevo libro" %} </h2>
    <form method='post'>
        {% csrf_token %}
        {{ form.as_p }}
        <button>{% trans "Guardar" %}</button>
        <a href='{% url "libro:list" %}'>{% trans "Cancelar" %}</a>
    </form>
{% endblock %}

{% extends "layout_base.html" %}
{% load i18n %}

{% block head_title%} {% trans "Iniciar sesión" %} {% endblock %}

{% block page_content%}
    <h1>{% trans "Pagina de Login" %}</h1>

    {% if error_message %}
        <p>{{ error_message }}</p>
    {% endif %}
    <form action="" method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button>{% trans "Enviar" %}</button>
    </form>
{% endblock %}
